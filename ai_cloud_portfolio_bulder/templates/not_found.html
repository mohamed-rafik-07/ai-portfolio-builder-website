<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Not Found — AI Portfolio Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:       #4f46e5;
      --blue-light: #6366f1;
      --blue-pale:  #eff6ff;
      --text-dark:  #1e293b;
      --text-muted: #64748b;
      --bg:         #f8fafc;
      --white:      #ffffff;
      --radius:     24px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .error-card {
      background: var(--white);
      max-width: 440px;
      width: 100%;
      padding: 60px 40px;
      border-radius: var(--radius);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      text-align: center;
    }
    .icon-box {
      width: 80px; height: 80px;
      background: #fff7ed;
      color: #ea580c;
      font-size: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 20px;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      border-radius: 12px;
      transition: var(--transition);
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
    }
    .btn:hover {
      background: var(--blue-light);
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
    }
    .back-link {
      display: block;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
    }
    .back-link:hover { color: var(--blue); }
  </style>
</head>
<body>

  <div class="error-card">
    <div class="icon-box">🔍</div>
    <h1>Portfolio Not Found</h1>
    <p>
      It looks like you haven't created a portfolio yet. 
      Click the button below to build your professional profile in seconds!
    </p>
    <a href="{{ url_for('create_portfolio') }}" class="btn">Create My Portfolio Now →</a>
    <a href="{{ url_for('dashboard') }}" class="back-link">Return to Dashboard</a>
  </div>

</body>
</html>
